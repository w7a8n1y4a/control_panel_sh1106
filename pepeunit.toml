[general]
name = "Control Panel SH1106"
description = "Принимает base64-кодированные кадры по `MQTT` и отображает их на `OLED` дисплее `SH1106 1.3\"` через `I2C`. Опционально поддерживает энкодер с кнопкой для публикации действий в топик `encoder_action/pepeunit`"
language = "Micropython"
hardware = ["esp32c3", "esp32s3", "esp8266 (unstable)", "SH1106 1.3\"", "KY-040", "encoder", "button"]
firmware = [
  {name = "RELEASE-1.1.1", link = "https://git.pepemoss.com/pepe/pepeunit/libs/pepeunit_micropython_client/-/releases/1.1.1"}
]
stack = ["pepeunit_micropython_client"]
version = "1.1.1"
license = "AGPL v3 License"
authors = [
    {name = "Ivan Serebrennikov", email = "admin@silberworks.com"}
]

[video]
video = {preview = "https://minio.pepemoss.com/public-data/video/base64_streaming_prev.jpg", link = "https://www.youtube.com/watch?v=r1CpkXD_MJY"}

[images]
"Schema esp32s3 zero" = "https://minio.pepemoss.com/public-data/schema/control_panel_sh1106_esp32s3_zero.png"
"Schema esp32c3 super mini" = "https://minio.pepemoss.com/public-data/schema/control_panel_sh1106_esp32c3_super_mini.png"
"Schema esp8266 wemos d1 mini" = "https://minio.pepemoss.com/public-data/schema/control_panel_sh1106_esp8266_wemos_d1_mini.png"

[models]
models = [
  {version = "v3", description = "Внутреняя капсула", link = "https://minio.pepemoss.com/public-data/model/control_panel_sh1106/v3/stl/capsule_insert.stl"},
  {version = "v3", description = "Блок экрана sh1106", link = "https://minio.pepemoss.com/public-data/model/control_panel_sh1106/v3/stl/capsule_panel.stl"},
  {version = "v3", description = "Блок энкодера KY-040", link = "https://minio.pepemoss.com/public-data/model/control_panel_sh1106/v3/stl/capsule_encoder.stl"},
  {version = "v3", description = "Блок esp32s3 zero", link = "https://minio.pepemoss.com/public-data/model/control_panel_sh1106/v3/stl/capsule_mc_esp32s3_zero.stl"},
  {version = "v3", description = "Блок esp32c3 super mini", link = "https://minio.pepemoss.com/public-data/model/control_panel_sh1106/v3/stl/capsule_mc_esp32с3_super_mini.stl"},
  {version = "v3", description = "Блок esp8266 wemos d1 mini", link = "https://minio.pepemoss.com/public-data/model/control_panel_sh1106/v3/stl/capsule_mc_wemos_d1_minii.stl"},
  {version = "v3", description = "Внешняя капсула", link = "https://minio.pepemoss.com/public-data/model/control_panel_sh1106/v3/stl/capsule_casing.stl"},
]

[physical_io]
"client.settings.PIN_SCL" = "Вывод `SCL` шины `I2C` для дисплея"
"client.settings.PIN_SDA" = "Вывод `SDA` шины `I2C` для дисплея"
"client.settings.PIN_BUTTON" = "Вывод кнопки (работает только при `FF_ENCODER_ENABLE` = `true`)"
"client.settings.PIN_ENCODER_CLK" = "Вывод `CLK` энкодера (работает только при `FF_ENCODER_ENABLE` = `true`)"
"client.settings.PIN_ENCODER_DT" = "Вывод `DT` энкодера (работает только при `FF_ENCODER_ENABLE` = `true`)"

[env_description]
FREQ = "Частота процессора в Гц"
FF_ENCODER_ENABLE = "Включить энкодер: `true` или `false`"
PIN_SCL = "Номер пина `SCL` шины `I2C`"
PIN_SDA = "Номер пина `SDA` шины `I2C`"
I2C_FREQUENCY = "Частота шины I2C в Гц"
I2C_ADDRESS = "I2C адрес дисплея в формате `\"0x3c\"`"
DISPLAY_WIDTH = "Ширина дисплея в пикселях"
DISPLAY_HEIGHT = "Высота дисплея в пикселях"
PIN_BUTTON = "Номер пина кнопки"
PIN_ENCODER_CLK = "Номер пина `CLK` энкодера"
PIN_ENCODER_DT = "Номер пина `DT` энкодера"
BUTTON_DEBOUNCE_TIME = "Время антидребезга кнопки в миллисекундах"
BUTTON_DOUBLE_CLICK_TIME = "Окно для двойного клика в миллисекундах"
BUTTON_LONG_PRESS_TIME = "Время долгого нажатия в миллисекундах"
ENCODER_STEPS_PER_DETENT = "Количество шагов энкодера на один щелчок"
PUC_WIFI_SSID = "Имя сети `WiFi`"
PUC_WIFI_PASS = "Пароль от сети `WiFi`"

[topic_assignment]
"full_frame/pepeunit" = "Принимает base64-кодированный кадр (входящий) для отображения на дисплее `SH1106`"
"encoder_action/pepeunit" = "Отправляет действие энкодера текстом: `One`, `Double`, `Long` (кнопка) или `Right`, `Left` (вращение)"

[work_algorithm]
steps = [
  "Подключение к `WiFi`",
  "Подключение к `MQTT` Брокеру",
  "Синхронизация времени по `NTP`",
  "Инициализация `I2C` шины и дисплея `SH1106`",
  "Инициализация энкодера и кнопки (если `FF_ENCODER_ENABLE` = `true`)",
  "Подписка на входящие `MQTT` топики",
  "При получении сообщения в `full_frame/pepeunit`: декодирование `base64` и отрисовка кадра на дисплее",
  "При нажатии кнопки или вращении энкодера: публикация действия в `encoder_action/pepeunit` (`One`, `Double`, `Long`, `Right`, `Left`)",
  "`env_example.json` по умолчанию настроен на `esp32s3 zero`",
  "`esp32c3 super mini` имеет потолок частоты `FREQ` = `160000000`",
  "`esp8266 wemos d1 mini` работает нестабильно и может перезапускаться в процессе. Рекомендуется использовать `FF_ENCODER_ENABLE` = `false`, а также частоту кристалла `FREQ` = `160000000`, при этом ограничив `fps` источника кадров `< 10 fps`, нестабильность скорее всего останется"
]

[installation]
steps = [
  "Установите образ `Micropython` указанный в `firmware` на одну из платформ, например для `esp32` как это сделано в [руководстве](https://micropython.org/download/ESP32_GENERIC/)",
  "Создайте `Unit` в `Pepeunit`",
  "Установите переменные окружения в `Pepeunit`",
  "Скачайте архив c программой из `Pepeunit`",
  "Распакуйте архив в директорию",
  "Загрузите файлы из директории на физическое устройство, например командой: `ampy -p /dev/ttyUSB0 -b 115200 put ./ .`",
  "Запустить устройство нажатием кнопки `reset`"
]
